name: Build and Release

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe
        run: |
          python -m PyInstaller game_assistant.spec --clean

      - name: Package release
        run: |
          mkdir release
          copy dist\GameAssistant.exe release\

      - name: Create zip
        run: |
          Compress-Archive -Path release\* -DestinationPath GameAssistant-windows.zip
        shell: pwsh

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: GameAssistant-windows.zip

      - name: Upload artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: GameAssistant-windows
          path: release/
